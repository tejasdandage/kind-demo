apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: nginx-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80
        env:
        - name: APP_ENV            # variable name inside pod
          valueFrom:
            configMapKeyRef:
              name: nginx-config   # configmap name
              key: APP_ENV         # key from configmap
        - name: DB_PASSWORD        # variable name inside pod
          valueFrom:
            secretKeyRef:
              name: nginx-secret   # secret name
              key: DB_PASSWORD     # key from secret
